<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherView - Modern Weather App</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated Background Particles -->
    <div class="particles" id="particles"></div>
    
    <!-- Main Container -->
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-cloud-sun logo-icon"></i>
                <h1>WeatherView</h1>
            </div>
            <div class="settings-icon">
                <i class="fas fa-cog"></i>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input 
                        type="text" 
                        id="cityInput" 
                        placeholder="Search for a city..." 
                        class="search-input"
                    >
                    <button id="searchBtn" class="search-btn">
                        <span>Search</span>
                        <div class="ripple"></div>
                    </button>
                </div>
                <button id="locationBtn" class="location-btn">
                    <i class="fas fa-location-arrow"></i>
                    <span>Use My Location</span>
                </button>
            </div>
            <!-- Error Message Toast -->
            <div id="errorToast" class="error-toast">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorMessage"></span>
            </div>
        </section>

        <!-- Loading Skeleton -->
        <div id="loadingSkeleton" class="loading-skeleton">
            <div class="skeleton-card skeleton-main"></div>
            <div class="skeleton-grid">
                <div class="skeleton-card skeleton-small"></div>
                <div class="skeleton-card skeleton-small"></div>
                <div class="skeleton-card skeleton-small"></div>
                <div class="skeleton-card skeleton-small"></div>
            </div>
        </div>

        <!-- Weather Display Container -->
        <div id="weatherContainer" class="weather-container hidden">
            <!-- Main Weather Card -->
            <div class="main-weather-card card-animate">
                <div class="location-info">
                    <h2 id="cityName" class="city-name">City Name</h2>
                    <p id="localTime" class="local-time">Monday, 3:41 PM</p>
                </div>
                
                <div class="weather-main">
                    <div class="weather-icon-container">
                        <i id="weatherIcon" class="weather-icon fas fa-sun"></i>
                    </div>
                    <div class="temperature-container">
                        <h1 id="temperature" class="temperature">0°</h1>
                        <p id="weatherDescription" class="weather-description">Clear Sky</p>
                    </div>
                </div>
            </div>

            <!-- Detailed Weather Information Grid -->
            <div class="weather-grid">
                <!-- Temperature Card -->
                <div class="weather-card card-animate" style="animation-delay: 0.1s">
                    <div class="card-header">
                        <i class="fas fa-temperature-high card-icon"></i>
                        <h3>Feels Like</h3>
                    </div>
                    <div class="card-content">
                        <h2 id="feelsLike" class="card-value">0°</h2>
                        <div class="progress-bar">
                            <div id="feelsLikeBar" class="progress-fill"></div>
                        </div>
                    </div>
                </div>

                <!-- Humidity Card -->
                <div class="weather-card card-animate" style="animation-delay: 0.2s">
                    <div class="card-header">
                        <i class="fas fa-droplet card-icon"></i>
                        <h3>Humidity</h3>
                    </div>
                    <div class="card-content">
                        <h2 id="humidity" class="card-value">0%</h2>
                        <div class="circular-progress">
                            <svg class="progress-ring" width="80" height="80">
                                <circle class="progress-ring-circle" stroke="#ffffff30" stroke-width="6" fill="transparent" r="34" cx="40" cy="40"/>
                                <circle id="humidityCircle" class="progress-ring-circle progress-ring-fill" stroke="url(#gradient1)" stroke-width="6" fill="transparent" r="34" cx="40" cy="40"/>
                                <defs>
                                    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Wind Speed Card -->
                <div class="weather-card card-animate" style="animation-delay: 0.3s">
                    <div class="card-header">
                        <i class="fas fa-wind card-icon"></i>
                        <h3>Wind Speed</h3>
                    </div>
                    <div class="card-content">
                        <h2 id="windSpeed" class="card-value">0 km/h</h2>
                        <div class="wind-direction">
                            <i id="windDirection" class="fas fa-location-arrow wind-arrow"></i>
                            <span id="windDeg">0°</span>
                        </div>
                    </div>
                </div>

                <!-- Air Quality Card -->
                <div class="weather-card card-animate" style="animation-delay: 0.4s">
                    <div class="card-header">
                        <i class="fas fa-lungs card-icon"></i>
                        <h3>Air Quality</h3>
                    </div>
                    <div class="card-content">
                        <h2 id="aqiValue" class="card-value">0</h2>
                        <div id="aqiLabel" class="aqi-label">Good</div>
                        <div class="aqi-scale">
                            <div id="aqiIndicator" class="aqi-indicator"></div>
                        </div>
                    </div>
                </div>

                <!-- Pressure Card -->
                <div class="weather-card card-animate" style="animation-delay: 0.5s">
                    <div class="card-header">
                        <i class="fas fa-gauge-high card-icon"></i>
                        <h3>Pressure</h3>
                    </div>
                    <div class="card-content">
                        <h2 id="pressure" class="card-value">0 hPa</h2>
                        <div class="metric-bar">
                            <div id="pressureBar" class="metric-fill"></div>
                        </div>
                    </div>
                </div>

                <!-- Visibility Card -->
                <div class="weather-card card-animate" style="animation-delay: 0.6s">
                    <div class="card-header">
                        <i class="fas fa-eye card-icon"></i>
                        <h3>Visibility</h3>
                    </div>
                    <div class="card-content">
                        <h2 id="visibility" class="card-value">0 km</h2>
                        <div class="metric-bar">
                            <div id="visibilityBar" class="metric-fill"></div>
                        </div>
                    </div>
                </div>

                <!-- UV Index Card -->
                <div class="weather-card card-animate" style="animation-delay: 0.7s">
                    <div class="card-header">
                        <i class="fas fa-sun card-icon"></i>
                        <h3>UV Index</h3>
                    </div>
                    <div class="card-content">
                        <h2 id="uvIndex" class="card-value">0</h2>
                        <div id="uvLabel" class="uv-label">Low</div>
                        <div class="uv-gauge">
                            <div id="uvNeedle" class="uv-needle"></div>
                        </div>
                    </div>
                </div>

                <!-- Sunrise/Sunset Card -->
                <div class="weather-card card-animate" style="animation-delay: 0.8s">
                    <div class="card-header">
                        <i class="fas fa-clock card-icon"></i>
                        <h3>Sun Times</h3>
                    </div>
                    <div class="card-content sun-times">
                        <div class="sun-time-item">
                            <i class="fas fa-sunrise"></i>
                            <span id="sunrise">--:--</span>
                        </div>
                        <div class="sun-time-item">
                            <i class="fas fa-sunset"></i>
                            <span id="sunset">--:--</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by <a href="https://openweathermap.org/" target="_blank">OpenWeatherMap API</a></p>
            <p id="lastUpdated" class="last-updated">Last updated: Never</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
